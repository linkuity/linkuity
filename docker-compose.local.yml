services:
  linkuity-runner:
    build:
      context: .
      dockerfile: Dockerfile.local
    volumes:
      - type: bind
        source: ${LINKUITY_INPUT}
        target: /linkuity/input/input.csv
        read_only: true
      - type: bind
        source: ${LINKUITY_PROFILE}
        target: /linkuity/config/profile.json
        read_only: true
      - type: bind
        source: ${LINKUITY_MERGE}
        target: /linkuity/config/merge.json
        read_only: true
      - type: bind
        source: ${LINKUITY_OUTPUT}
        target: /linkuity/output
      - type: bind
        source: ${LINKUITY_ARTIFACTS}
        target: /linkuity/output/artifacts
    command:
      - run
      - --input
      - /linkuity/input/input.csv
      - --profile
      - /linkuity/config/profile.json
      - --merge-policy
      - /linkuity/config/merge.json
      - --output
      - /linkuity/output
