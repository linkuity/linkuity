name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# pull_request_target runs in the context of the base repo (so it can access the
# signature store and post status/comments even for fork PRs). This workflow does
# NOT check out or run PR code, so that is safe here.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck'
            || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A classic Personal Access Token with `repo` scope, stored as a repo
          # secret named PERSONAL_ACCESS_TOKEN. Required so the action can commit
          # the signatures file to the branch below. See CONTRIBUTING.md.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          # Where signatures are recorded. Stored on a dedicated, UNPROTECTED
          # branch so the bot's signature commits are not blocked by the branch
          # protection ruleset on `main`.
          path-to-signatures: signatures/version1/cla.json
          # The document contributors are agreeing to.
          path-to-document: https://github.com/linkuity/linkuity/blob/main/CLA.md
          branch: cla-signatures
          # Exact phrases contributors comment on the PR.
          custom-notsigned-prcomment: >-
            Thank you for your contribution. Before we can merge it, we need you to
            sign the [Contributor License Agreement](CLA.md). Please read it, then
            comment the following on this pull request:
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-allsigned-prcomment: All contributors have signed the CLA. Thank you!
          # Bots that never need to sign.
          allowlist: dependabot[bot],renovate[bot]
